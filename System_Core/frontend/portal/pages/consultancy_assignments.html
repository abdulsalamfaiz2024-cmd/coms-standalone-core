<div class="flex flex-col gap-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Project Assignments</h1>
            <p class="text-gray-400 font-bold uppercase text-[11px] tracking-widest mt-1">Operational Oversight</p>
        </div>
        <div id="page-action-container" class="flex items-center gap-3">
            <button
                class="btn-new-entity px-6 py-3 bg-primary-600 text-white font-extrabold rounded-xl shadow-lg shadow-primary-200 hover:bg-primary-700 transition-all flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path>
                </svg>
                Launch Assignment
            </button>
        </div>
    </div>

    <!-- Project Health Dashboard -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Progress Overview -->
        <div
            class="bg-gray-900 text-white p-8 rounded-[2.5rem] shadow-2xl shadow-gray-400/50 md:col-span-2 relative overflow-hidden">
            <div class="relative z-10 flex gap-8 items-center h-full">
                <div class="flex-1">
                    <h3 class="text-2xl font-bold mb-2">Portfolio Health</h3>
                    <p class="text-gray-400 text-sm mb-6">Real-time status of all active consultancy mandates.</p>

                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between text-xs font-bold uppercase tracking-widest mb-1">
                                <span>Active</span> <span id="prog-active-val">--%</span>
                            </div>
                            <div class="h-2 bg-gray-700 rounded-full overflow-hidden">
                                <div id="prog-active-bar" class="h-full bg-green-500 w-0 transition-all duration-1000">
                                </div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-xs font-bold uppercase tracking-widest mb-1">
                                <span>Completed</span> <span id="prog-comp-val">--%</span>
                            </div>
                            <div class="h-2 bg-gray-700 rounded-full overflow-hidden">
                                <div id="prog-comp-bar" class="h-full bg-blue-500 w-0 transition-all duration-1000">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="w-32 h-32">
                    <canvas id="chart-priority"></canvas>
                </div>
            </div>
            <div class="absolute top-0 right-0 w-64 h-64 bg-primary-600 opacity-20 rounded-full blur-3xl -mr-10 -mt-10">
            </div>
        </div>

        <!-- Inactive/Alerts -->
        <div
            class="bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-xl shadow-gray-200/50 flex flex-col justify-center items-center text-center">
            <div class="w-16 h-16 bg-red-50 rounded-2xl flex items-center justify-center text-red-500 mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                    </path>
                </svg>
            </div>
            <h3 class="text-3xl font-black text-gray-900" id="stat-inactive">0</h3>
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mt-1">Inactive Projects</p>
        </div>
    </div>

    <!-- Standard Table View for Assignments (Best for detailed data) -->
    <div id="data-table-container"
        class="bg-white shadow-xl shadow-gray-200/50 rounded-[2rem] border border-gray-100 overflow-hidden">
        <table class="w-full text-sm text-left text-gray-500">
            <thead class="text-xs text-gray-400 uppercase bg-gray-50/50 border-b border-gray-100" id="table-head">
            </thead>
            <tbody id="table-body"></tbody>
        </table>
        <div id="empty-state" class="hidden p-20 text-center font-black text-gray-300 italic tracking-tighter text-2xl">
            No Assignments Found</div>
    </div>
</div>
