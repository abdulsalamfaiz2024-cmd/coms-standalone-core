<div class="flex flex-col gap-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Consultant Expert Hub</h1>
            <p class="text-gray-400 font-bold uppercase text-[11px] tracking-widest mt-1">Talent Management & Deployment
            </p>
        </div>
        <div id="page-action-container" class="flex items-center gap-3">
            <button
                class="btn-new-entity px-6 py-3 bg-primary-600 text-white font-extrabold rounded-xl shadow-lg shadow-primary-200 hover:bg-primary-700 transition-all flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path>
                </svg>
                Onboard Expert
            </button>
        </div>
    </div>

    <!-- Visuals -->
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        <!-- Status Chart -->
        <div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-xl shadow-gray-200/50 col-span-1">
            <h3 class="text-sm font-black uppercase text-gray-400 tracking-widest mb-4">Availability</h3>
            <div class="h-40 flex justify-center">
                <canvas id="chart-consultant-status"></canvas>
            </div>
        </div>

        <!-- Metric Cards -->
        <div class="lg:col-span-3 grid grid-cols-3 gap-4">
            <div
                class="bg-gradient-to-br from-indigo-500 to-purple-600 rounded-[2rem] p-6 text-white shadow-xl shadow-indigo-200 relative overflow-hidden">
                <h2 class="text-4xl font-black mb-1" id="stat-total-cons">--</h2>
                <p class="text-xs font-bold opacity-80 uppercase tracking-widest">Total Experts</p>
                <div class="absolute -right-4 -bottom-4 w-24 h-24 bg-white opacity-10 rounded-full blur-xl"></div>
            </div>
            <div
                class="bg-white rounded-[2rem] p-6 text-gray-900 border border-gray-100 shadow-xl shadow-gray-100 flex flex-col justify-center">
                <h2 class="text-4xl font-black text-green-500 mb-1" id="stat-active-cons">--</h2>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Deployed on Projects</p>
            </div>
            <div
                class="bg-white rounded-[2rem] p-6 text-gray-900 border border-gray-100 shadow-xl shadow-gray-100 flex flex-col justify-center">
                <h2 class="text-4xl font-black text-orange-400 mb-1" id="stat-bench-cons">--</h2>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Available (Bench)</p>
            </div>
        </div>
    </div>

    <!-- Directory Grid -->
    <div>
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-xl font-bold text-gray-900">Talent Cards</h3>
            <input type="text" id="global-search" onkeyup="if(event.key==='Enter') engine.refreshList(this.value)"
                placeholder="Find expert..."
                class="w-64 px-4 py-2 text-xs font-bold text-gray-900 border border-gray-200 rounded-xl bg-gray-50">
        </div>
        <div id="card-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Injected -->
        </div>
    </div>
</div>
