
<div class="flex flex-col gap-8">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Roles</h1>
            <p class="text-gray-400 font-bold uppercase text-[11px] tracking-widest mt-1">Management Console / Secure SQL View</p>
        </div>
        <div class="flex gap-3">
            <button class="btn-new-entity px-6 py-3 bg-primary-600 text-white font-extrabold rounded-xl shadow-lg shadow-primary-200 hover:bg-primary-700 transition-all flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                Create Record
            </button>
        </div>
    </div>

    <!-- Interface Controls -->
    <div class="flex items-center gap-4 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
        <div class="relative flex-1">
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-gray-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <input type="text" id="global-search" onkeyup="if(event.key==='Enter') engine.refreshList(this.value)" placeholder="Search Roles records..." class="block w-full p-4 pl-12 text-sm text-gray-900 border border-gray-100 rounded-xl bg-gray-50 focus:ring-primary-500 focus:border-primary-500 font-bold">
        </div>
        <button onclick="engine.refreshList($('#global-search').val())" class="px-6 py-4 bg-gray-900 text-white rounded-xl text-sm font-extrabold hover:bg-black transition-all">Execute Query</button>
    </div>

    <!-- Entity Table -->
    <div id="data-table-container" class="relative bg-white shadow-xl shadow-gray-200/50 rounded-[2rem] border border-gray-100 overflow-hidden">
        <table class="w-full text-sm text-left text-gray-500">
            <thead class="text-xs text-gray-400 uppercase bg-gray-50/50 border-b border-gray-100" id="table-head">
                <!-- Data will be injected -->
            </thead>
            <tbody id="table-body">
                <!-- Data will be injected -->
            </tbody>
        </table>
        <div id="empty-state" class="hidden p-20 text-center font-black text-gray-300 italic tracking-tighter text-2xl">Virtual Table Empty</div>
    </div>
</div>
