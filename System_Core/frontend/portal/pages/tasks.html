<div class="flex flex-col gap-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Active Tasks</h1>
            <p class="text-gray-400 font-bold uppercase text-[11px] tracking-widest mt-1">Daily Operations & Activity
                Log</p>
        </div>
        <div id="page-action-container" class="flex items-center gap-3">
            <button
                class="btn-new-entity px-6 py-3 bg-primary-600 text-white font-extrabold rounded-xl shadow-lg shadow-primary-200 hover:bg-primary-700 transition-all flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path>
                </svg>
                Log New Task
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div
            class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-lg col-span-1 flex flex-col items-center justify-center text-center">
            <h3 class="text-5xl font-black text-primary-600 mb-2" id="val-pending-tasks">--</h3>
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Pending</p>
        </div>
        <div
            class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-lg col-span-1 flex flex-col items-center justify-center text-center">
            <h3 class="text-5xl font-black text-green-500 mb-2" id="val-completed-tasks">--</h3>
            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Completed</p>
        </div>
        <div
            class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-lg col-span-2 flex items-center justify-between px-10">
            <div>
                <h3 class="text-lg font-bold text-gray-900 mb-1">Workload Visualizer</h3>
                <p class="text-xs text-gray-400">Task distribution by completion status.</p>
            </div>
            <div class="h-24 w-24">
                <canvas id="chart-task-completion"></canvas>
            </div>
        </div>
    </div>

    <div id="data-table-container"
        class="bg-white shadow-xl shadow-gray-200/50 rounded-[2rem] border border-gray-100 overflow-hidden">
        <table class="w-full text-sm text-left text-gray-500">
            <thead class="text-xs text-gray-400 uppercase bg-gray-50/50 border-b border-gray-100" id="table-head">
            </thead>
            <tbody id="table-body"></tbody>
        </table>
        <div id="empty-state" class="hidden p-20 text-center font-black text-gray-300 italic tracking-tighter text-2xl">
            No Tasks</div>
    </div>
</div>
